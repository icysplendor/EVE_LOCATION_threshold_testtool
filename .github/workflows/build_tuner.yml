name: Build Threshold Tuner Tool

on:
  workflow_dispatch:  # 允许手动点击触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 安装运行 tuner.py 所需的库
        pip install PyQt6 opencv-python numpy mss pyinstaller

    - name: Build Tuner EXE
      run: |
        # 打包成单文件 EXE，不显示控制台黑框 (--noconsole)
        pyinstaller --onefile --noconsole --name "Threshold_Tuner" tuner.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Threshold_Tuner_Tool
        path: dist/Threshold_Tuner.exe
