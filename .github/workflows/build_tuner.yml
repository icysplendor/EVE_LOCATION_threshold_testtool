name: Build Threshold Tuner Tool

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_tuner.txt

    - name: Build Tuner EXE
      run: |
        # 打包成单文件 EXE，无控制台黑框
        # --clean: 清理缓存
        # --windowed: 无控制台
        pyinstaller --clean --onefile --windowed --name "Threshold_Tuner" tuner.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Threshold_Tuner_Tool
        path: dist/Threshold_Tuner.exe
